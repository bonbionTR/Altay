name: Nightly

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Publish Nightly
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: pmmp/setup-php-action@fa2accea978a84097cf40ecc7d46b2d71f258bd5
        with:
          php-version: "8.1"
          install-path: "${{ github.workspace }}/php"
          pm-version-major: "5"

      - name: Configure git for HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Load Composer package cache
        uses: actions/cache@v4
        with:
          path: "~/.cache/composer"
          key: "php-8.1-composer-nightly-${{ hashFiles('**/composer.json') }}"
          restore-keys: "php-8.1-composer-nightly-"

      - name: Install dependencies (no-dev)
        run: composer install --no-dev --classmap-authoritative --ignore-platform-reqs --prefer-dist --no-interaction

      - name: Build server phar
        run: ${{ github.workspace }}/php/bin/php -dphar.readonly=0 build/server-phar.php --out Zenith.phar --git "${{ github.sha }}"

      - name: Delete existing nightly release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: nightly
          delete_release: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish nightly release
        uses: ncipollo/release-action@v1.15.0
        with:
          tag: nightly
          name: "Nightly Build"
          body: |
            Automatic nightly build from commit ${{ github.sha }}.

            **Branch:** `${{ github.ref_name }}`
            **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Built at:** ${{ github.event.head_commit.timestamp }}

            > This is a development build. Not recommended for production use.
          artifacts: "Zenith.phar"
          prerelease: true
          makeLatest: false
          token: ${{ secrets.GITHUB_TOKEN }}
